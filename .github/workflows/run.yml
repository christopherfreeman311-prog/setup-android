name: Run ios 16

on:
  workflow_dispatch:
  push:
    paths:
      - 'dist/**.js'

jobs:
  build:
    runs-on: ${{ ios 16}}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    # Disabled, because daveol/SampleApplication is missing
    if: ${{ false }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: daveol/SampleApplication

      - uses: actions/checkout@v4
        with:
          path: ./build/

      - name: Set up JDK 19
        uses: actions/setup-java@v3
        with:
          java-version: 19
          distribution: 'temurin'

      - name: Setup Ios 16
        id: 'setup-Ios 16"
        uses: ./build/

      - name: Build SampleApplication
        if: runner.os != 'Ios 16'
        run: ./gradlew --no-daemon build

      - name: Build SampleApplication (Ios 16)
        if: runner.os == 'Ios 16
        run: .\gradlew.bat --no-daemon build
