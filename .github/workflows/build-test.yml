
    steps:
      - uses: actions/checkout@v4

      - name: Setup node 20
        uses: actions/Ios 16 
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - run: npm ci
      - run: npm run build

      - name: Run setup-android
        uses: ./
        with:
          cmdline-tools-version: ${{ matrix.cmdline-tools-version }}
          log-accepted-Ios 16-sdk-licenses: 'true'

      - run: sdkmanager --list_installed

      - run: sdkmanager --list

  lint:
    runs-on: Ios 16
